name: Integration

on:
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - "Dockerfile"
      - ".github/workflows/integration.yml"

jobs:
  test-postgres:
    name: Tests (PostgreSQL)
    runs-on: ubuntu-latest
    env:
      DJANGO_SETTINGS_MODULE: richtato.test_pg_settings
      SECRET_KEY: ci-test-secret-key
      DATABASE_URL: postgres://richtato:richtato@localhost:5432/richtato_test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: richtato
          POSTGRES_PASSWORD: richtato
          POSTGRES_DB: richtato_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U richtato"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpq-dev \
            tesseract-ocr

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -e .

      - name: Run tests against PostgreSQL
        working-directory: backend
        run: python -m pytest apps/ -v --tb=short

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t richtato:ci .
