<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="incomeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="expenseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="savingsGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.6"/>
    </linearGradient>
    <linearGradient id="sankeyFlow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="sankeyFlow2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="sankeyFlow3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#eab308;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad2)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="50" fill="#111" rx="12"/>
  <circle cx="25" cy="25" r="6" fill="#ef4444"/>
  <circle cx="45" cy="25" r="6" fill="#eab308"/>
  <circle cx="65" cy="25" r="6" fill="#22c55e"/>
  <text x="400" y="30" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14">Cashflow - Sankey Diagram</text>

  <!-- Sidebar -->
  <rect x="0" y="50" width="180" height="450" fill="#111"/>
  <rect x="30" y="90" width="80" height="12" fill="#444" rx="4"/>
  <rect x="15" y="120" width="150" height="35" fill="#22c55e" rx="8" opacity="0.2"/>
  <rect x="30" y="130" width="90" height="15" fill="#22c55e" rx="4"/>
  <rect x="30" y="175" width="110" height="12" fill="#444" rx="4"/>
  <rect x="30" y="205" width="85" height="12" fill="#444" rx="4"/>

  <!-- Main content - Sankey Diagram -->
  <rect x="200" y="70" width="580" height="410" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="220" y="100" fill="#fff" font-family="system-ui" font-size="16" font-weight="bold">Money Flow</text>
  <text x="220" y="120" fill="#666" font-family="system-ui" font-size="12">January 2026</text>

  <!-- Sankey nodes - Income sources (left) -->
  <rect x="240" y="150" width="80" height="80" fill="#22c55e" rx="8"/>
  <text x="280" y="185" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">Salary</text>
  <text x="280" y="205" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="14">$8,500</text>

  <rect x="240" y="250" width="80" height="50" fill="#22c55e" rx="8" opacity="0.8"/>
  <text x="280" y="275" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">Side Gig</text>
  <text x="280" y="292" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">$1,200</text>

  <rect x="240" y="320" width="80" height="35" fill="#22c55e" rx="8" opacity="0.6"/>
  <text x="280" y="343" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">Dividends $400</text>

  <!-- Sankey middle node - Total Income -->
  <rect x="400" y="170" width="90" height="140" fill="#3b82f6" rx="8"/>
  <text x="445" y="230" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">Total</text>
  <text x="445" y="250" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11" font-weight="bold">Income</text>
  <text x="445" y="280" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="16" font-weight="bold">$10.1K</text>

  <!-- Sankey nodes - Expense categories (right) -->
  <rect x="570" y="140" width="85" height="60" fill="#ef4444" rx="8"/>
  <text x="612" y="165" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="bold">Housing</text>
  <text x="612" y="185" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="13">$2,800</text>

  <rect x="570" y="210" width="85" height="45" fill="#ef4444" rx="8" opacity="0.85"/>
  <text x="612" y="230" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="bold">Food</text>
  <text x="612" y="247" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="12">$1,500</text>

  <rect x="570" y="265" width="85" height="40" fill="#ef4444" rx="8" opacity="0.7"/>
  <text x="612" y="283" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10" font-weight="bold">Transport</text>
  <text x="612" y="298" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="11">$800</text>

  <rect x="570" y="315" width="85" height="35" fill="#ef4444" rx="8" opacity="0.55"/>
  <text x="612" y="337" text-anchor="middle" fill="#fff" font-family="system-ui" font-size="10">Other $600</text>

  <rect x="570" y="360" width="85" height="55" fill="#eab308" rx="8"/>
  <text x="612" y="383" text-anchor="middle" fill="#000" font-family="system-ui" font-size="10" font-weight="bold">Savings</text>
  <text x="612" y="403" text-anchor="middle" fill="#000" font-family="system-ui" font-size="14" font-weight="bold">$4,400</text>

  <!-- Flow paths (curved lines representing money flow) -->
  <path d="M320 190 C360 190, 360 220, 400 220" stroke="url(#sankeyFlow1)" stroke-width="35" fill="none" opacity="0.6"/>
  <path d="M320 275 C360 275, 360 250, 400 250" stroke="url(#sankeyFlow1)" stroke-width="20" fill="none" opacity="0.5"/>
  <path d="M320 337 C360 337, 360 280, 400 280" stroke="url(#sankeyFlow1)" stroke-width="12" fill="none" opacity="0.4"/>

  <path d="M490 200 C530 200, 540 170, 570 170" stroke="url(#sankeyFlow2)" stroke-width="25" fill="none" opacity="0.5"/>
  <path d="M490 220 C530 220, 540 230, 570 230" stroke="url(#sankeyFlow2)" stroke-width="18" fill="none" opacity="0.45"/>
  <path d="M490 240 C530 240, 540 280, 570 280" stroke="url(#sankeyFlow2)" stroke-width="12" fill="none" opacity="0.4"/>
  <path d="M490 260 C530 260, 540 330, 570 330" stroke="url(#sankeyFlow2)" stroke-width="10" fill="none" opacity="0.35"/>
  <path d="M490 280 C530 280, 540 385, 570 385" stroke="url(#sankeyFlow3)" stroke-width="30" fill="none" opacity="0.5"/>

  <!-- Summary stats at bottom -->
  <rect x="220" y="430" width="160" height="35" fill="#22c55e" rx="8" opacity="0.2"/>
  <text x="300" y="452" text-anchor="middle" fill="#22c55e" font-family="system-ui" font-size="12">Income: $10,100</text>

  <rect x="400" y="430" width="160" height="35" fill="#ef4444" rx="8" opacity="0.2"/>
  <text x="480" y="452" text-anchor="middle" fill="#ef4444" font-family="system-ui" font-size="12">Expenses: $5,700</text>

  <rect x="580" y="430" width="160" height="35" fill="#eab308" rx="8" opacity="0.2"/>
  <text x="660" y="452" text-anchor="middle" fill="#eab308" font-family="system-ui" font-size="12">Savings: $4,400</text>
</svg>
