<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad3)" rx="12"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="50" fill="#111" rx="12"/>
  <circle cx="25" cy="25" r="6" fill="#ef4444"/>
  <circle cx="45" cy="25" r="6" fill="#eab308"/>
  <circle cx="65" cy="25" r="6" fill="#22c55e"/>
  <text x="400" y="30" text-anchor="middle" fill="#888" font-family="system-ui" font-size="14">Asset Dashboard - Net Worth</text>

  <!-- Sidebar -->
  <rect x="0" y="50" width="180" height="450" fill="#111"/>
  <rect x="30" y="90" width="80" height="12" fill="#444" rx="4"/>
  <rect x="30" y="120" width="100" height="12" fill="#444" rx="4"/>
  <rect x="15" y="150" width="150" height="35" fill="#22c55e" rx="8" opacity="0.2"/>
  <rect x="30" y="160" width="90" height="15" fill="#22c55e" rx="4"/>
  <rect x="30" y="205" width="85" height="12" fill="#444" rx="4"/>

  <!-- Main content area -->
  <!-- Net Worth Summary Cards -->
  <rect x="200" y="70" width="280" height="100" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="220" y="100" fill="#888" font-family="system-ui" font-size="12">Total Net Worth</text>
  <text x="220" y="140" fill="#22c55e" font-family="system-ui" font-size="32" font-weight="bold">$284,750</text>
  <text x="380" y="140" fill="#22c55e" font-family="system-ui" font-size="14">+12.4%</text>

  <rect x="500" y="70" width="140" height="100" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="520" y="100" fill="#888" font-family="system-ui" font-size="12">Assets</text>
  <text x="520" y="135" fill="#3b82f6" font-family="system-ui" font-size="22" font-weight="bold">$312K</text>

  <rect x="660" y="70" width="120" height="100" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="680" y="100" fill="#888" font-family="system-ui" font-size="12">Liabilities</text>
  <text x="680" y="135" fill="#ef4444" font-family="system-ui" font-size="22" font-weight="bold">$27K</text>

  <!-- Net Worth Chart -->
  <rect x="200" y="190" width="580" height="200" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="220" y="220" fill="#fff" font-family="system-ui" font-size="14" font-weight="bold">Net Worth Over Time</text>

  <!-- Grid lines -->
  <line x1="240" y1="250" x2="750" y2="250" stroke="#333" stroke-width="1"/>
  <line x1="240" y1="290" x2="750" y2="290" stroke="#333" stroke-width="1"/>
  <line x1="240" y1="330" x2="750" y2="330" stroke="#333" stroke-width="1"/>
  <line x1="240" y1="370" x2="750" y2="370" stroke="#333" stroke-width="1"/>

  <!-- Y-axis labels -->
  <text x="230" y="255" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">$300K</text>
  <text x="230" y="295" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">$250K</text>
  <text x="230" y="335" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">$200K</text>
  <text x="230" y="375" text-anchor="end" fill="#666" font-family="system-ui" font-size="10">$150K</text>

  <!-- Area under the line -->
  <path d="M260 360 L320 350 L380 340 L440 320 L500 300 L560 280 L620 270 L680 260 L740 255 L740 370 L260 370 Z" fill="url(#areaGrad)"/>

  <!-- Line chart -->
  <path d="M260 360 L320 350 L380 340 L440 320 L500 300 L560 280 L620 270 L680 260 L740 255" stroke="url(#lineGrad)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="260" cy="360" r="5" fill="#22c55e"/>
  <circle cx="320" cy="350" r="5" fill="#22c55e"/>
  <circle cx="380" cy="340" r="5" fill="#22c55e"/>
  <circle cx="440" cy="320" r="5" fill="#22c55e"/>
  <circle cx="500" cy="300" r="5" fill="#22c55e"/>
  <circle cx="560" cy="280" r="5" fill="#22c55e"/>
  <circle cx="620" cy="270" r="5" fill="#22c55e"/>
  <circle cx="680" cy="260" r="5" fill="#22c55e"/>
  <circle cx="740" cy="255" r="6" fill="#22c55e" stroke="#fff" stroke-width="2"/>

  <!-- X-axis labels -->
  <text x="260" y="385" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Jan</text>
  <text x="380" y="385" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Mar</text>
  <text x="500" y="385" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">May</text>
  <text x="620" y="385" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Jul</text>
  <text x="740" y="385" text-anchor="middle" fill="#666" font-family="system-ui" font-size="10">Sep</text>

  <!-- Account breakdown -->
  <rect x="200" y="410" width="280" height="70" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="220" y="435" fill="#fff" font-family="system-ui" font-size="12" font-weight="bold">Top Accounts</text>

  <circle cx="230" cy="458" r="4" fill="#3b82f6"/>
  <text x="240" y="462" fill="#888" font-family="system-ui" font-size="11">401(k) - $142,500</text>

  <circle cx="370" cy="458" r="4" fill="#22c55e"/>
  <text x="380" y="462" fill="#888" font-family="system-ui" font-size="11">Brokerage - $98,200</text>

  <!-- Asset allocation -->
  <rect x="500" y="410" width="280" height="70" fill="#1a1a2e" rx="12" stroke="#333" stroke-width="1"/>
  <text x="520" y="435" fill="#fff" font-family="system-ui" font-size="12" font-weight="bold">Asset Allocation</text>

  <rect x="520" y="450" width="100" height="12" fill="#333" rx="6"/>
  <rect x="520" y="450" width="55" height="12" fill="#3b82f6" rx="6"/>
  <text x="635" y="460" fill="#888" font-family="system-ui" font-size="10">Stocks 55%</text>

  <rect x="520" y="465" width="100" height="12" fill="#333" rx="6"/>
  <rect x="520" y="465" width="30" height="12" fill="#22c55e" rx="6"/>
  <text x="635" y="475" fill="#888" font-family="system-ui" font-size="10">Bonds 30%</text>
</svg>
