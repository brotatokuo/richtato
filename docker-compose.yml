services:
  # PostgreSQL Database
  db:
    image: postgres:15
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U richtato"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./.cursor:/app/.cursor_logs
    depends_on:
      db:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: yarn dev --host 0.0.0.0

  # Statement download automation (Playwright + scheduler)
  automation:
    build:
      context: ./scripts/automation
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - ./local_data:/app/local_data
      - ./scripts/automation:/app/scripts/automation
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    command: python -m scripts.automation.scheduler

volumes:
  postgres_data:
  static_volume:
  media_volume:
