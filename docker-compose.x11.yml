services:
  # Overlay that enables headed Chromium for the bank-sync agent.
  #
  # Docker Desktop on Linux cannot mount /tmp/.X11-unix without adding it
  # under Settings -> Resources -> File Sharing. Instead we use a TCP bridge
  # on the host and point the container at host.docker.internal:0.
  #
  #   xhost +local:
  #   python3 scripts/bank_sync/x11_bridge.py   # leave running
  #   docker compose -f docker-compose.yml -f docker-compose.x11.yml up -d automation
  #
  # Native Linux Docker (socket mount works) can set BANK_SYNC_X11_MODE=socket
  # in .env to skip the TCP bridge.
  automation:
    environment:
      - DISPLAY=${BANK_SYNC_X11_DISPLAY:-host.docker.internal:0}
      - XAUTHORITY=/tmp/.xauthority
    volumes:
      - ${BANK_SYNC_XAUTHORITY:-./local_data/.xauthority}:/tmp/.xauthority:ro
