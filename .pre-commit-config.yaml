repos:
  # Python linting and formatting with ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.3
    hooks:
      - id: ruff
        args: [--fix]
        types: [python]
      - id: ruff-format
        types: [python]

  # Frontend linting and formatting
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.35.0
    hooks:
      - id: eslint
        files: \.(js|jsx|ts|tsx)$
        additional_dependencies:
          - eslint@^9.35.0
          - '@eslint/js@^9.35.0'
          - 'globals@^15.12.0'
          - 'typescript-eslint@^8.15.0'
          - 'eslint-plugin-react@^7.37.1'
          - 'eslint-plugin-react-hooks@^5.0.0'
          - 'eslint-plugin-react-refresh@^0.4.12'
        args: [--fix, --max-warnings=0, --config=frontend/eslint.config.js]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|md|yaml|yml)$
        exclude: ^(node_modules/|\.git/|dist/|build/)
        args: [--config=frontend/.prettierrc]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: tsconfig.*\.json$
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]

  # Strip outputs from all Jupyter notebooks
  - repo: https://github.com/kynan/nbstripout
    rev: 0.7.1
    hooks:
      - id: nbstripout
        name: Strip Jupyter notebook outputs
        files: \.ipynb$
